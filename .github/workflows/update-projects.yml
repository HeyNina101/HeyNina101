name: Update Projects
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import requests
          import re
          import sys

          user = "HeyNina101"
          headers = {"Authorization": f"token ${{ secrets.GITHUB_TOKEN }}"}

          try:
              response = requests.get(
                  f"https://api.github.com/users/{user}/repos?sort=stars&per_page=20",
                  headers=headers
              )
              response.raise_for_status()
              repos = response.json()

              projects = sorted(
                  [r for r in repos if r['name'].lower() != user.lower() and not r['fork']],
                  key=lambda x: x['stargazers_count'],
                  reverse=True
              )[:6]
          except Exception as e:
              print(f"Error fetching repos: {e}")
              sys.exit(1)

          # Fetch open pull requests count for each repo
          def get_pr_count(repo_name):
              try:
                  r = requests.get(
                      f"https://api.github.com/repos/{user}/{repo_name}/pulls?state=open&per_page=1",
                      headers=headers
                  )
                  # GitHub doesn't return total count directly for PRs,
                  # so we check the Link header or just count results
                  prs = r.json()
                  # Get all open PRs (up to 100)
                  r2 = requests.get(
                      f"https://api.github.com/repos/{user}/{repo_name}/pulls?state=open&per_page=100",
                      headers=headers
                  )
                  return len(r2.json())
              except:
                  return 0

          # Color palette (your nebular brand)
          COLOR_STARS  = "f7b93e"   # golden
          COLOR_FORKS  = "357a54"   # blue-grey
          COLOR_ISSUES = "357a54"   # dusty red
          COLOR_PRS    = "357a54"   # forest green
          COLOR_LABEL  = "357a54"   # dark green (label background)

          def stars_badge(n):
              return f"![Stars](https://img.shields.io/badge/⭐_stars-{n}-{COLOR_STARS}?style=flat-square)"

          def forks_badge(n):
              return f"![Forks](https://img.shields.io/badge/🍴_forks-{n}-{COLOR_FORKS}?style=flat-square)"

          def issues_badge(n):
              color = COLOR_ISSUES if n > 0 else "4A7A5C"
              return f"![Issues](https://img.shields.io/badge/issues-{n}_open-{color}?style=flat-square)"

          def prs_badge(n):
              return f"![PRs](https://img.shields.io/badge/pull_requests-{n}_open-{COLOR_PRS}?style=flat-square)"

          # Build table
          table = "\n"
          table += "| Project | ⭐ Stars | Forks | Issues | Pull Requests |\n"
          table += "|:--|:--:|:--:|:--:|:--:|\n"

          for repo in projects:
              name        = repo['name']
              url         = repo['html_url']
              stars       = repo.get('stargazers_count', 0)
              forks       = repo.get('forks_count', 0)
              issues      = repo.get('open_issues_count', 0)
              pr_count    = get_pr_count(name)
              # open_issues_count includes PRs in GitHub API, so subtract
              real_issues = max(issues - pr_count, 0)

              table += (
                  f"| [{name}]({url}) "
                  f"| {stars_badge(stars)} "
                  f"| {forks_badge(forks)} "
                  f"| {issues_badge(real_issues)} "
                  f"| {prs_badge(pr_count)} |\n"
              )

          table += "\n"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          start_tag = "<!-- PROJECTS:START -->"
          end_tag   = "<!-- PROJECTS:END -->"

          if start_tag not in content or end_tag not in content:
              print("Tags not found in README.md — skipping.")
              sys.exit(0)

          pattern     = re.escape(start_tag) + ".*?" + re.escape(end_tag)
          replacement = f"{start_tag}\n{table}{end_tag}"
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("README updated successfully.")
          EOF

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update projects table [skip ci]" || exit 0
          git push
